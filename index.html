<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Study Flashcards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Nastaliq+Urdu:wght@400;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           🎨 DESIGN TOKENS
           ============================================================ */

        :root {
            /* --- Core palette --- */
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --accent-dark: #d97706;
            --success: #10b981;
            --success-light: #34d399;
            --surface: #ffffff;
            --surface-alt: #f8fafc;
            --surface-dark: #0f172a;
            --surface-dark-alt: #1e293b;
            --text: #0f172a;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --text-dark: #f8fafc;
            --text-dark-muted: #94a3b8;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-lg: rgba(0, 0, 0, 0.12);
            --glass: rgba(255, 255, 255, 0.8);
            --glass-dark: rgba(15, 23, 42, 0.8);
            --radius: 24px;
            --radius-sm: 12px;
            --radius-lg: 32px;
            --ease: cubic-bezier(0.4, 0.0, 0.2, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease-smooth: cubic-bezier(0.4, 0.0, 0.6, 1);
        }

        /* --- DARK MODE --- */
        [data-theme="dark"] {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --accent: #fbbf24;
            --accent-dark: #f59e0b;
            --surface: #0f172a;
            --surface-alt: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --text-light: #64748b;
            --border: #1e293b;
            --border-light: #0f172a;
            --shadow: rgba(0, 0, 0, 0.5);
            --shadow-lg: rgba(0, 0, 0, 0.6);
            --glass: rgba(15, 23, 42, 0.85);
            --glass-dark: rgba(15, 23, 42, 0.9);
        }

        /* ============================================================
           🏗  LAYOUT & BASE
           ============================================================ */

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--surface-alt);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background 0.4s var(--ease), color 0.4s var(--ease);
            overflow: hidden;
            overscroll-behavior: none;
            padding: 0;
            gap: 0;
        }

        /* ============================================================
           🧩  COMPONENTS
           ============================================================ */

        /* --- Theme Toggle --- */
        .theme-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s var(--ease);
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .theme-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 24px var(--shadow);
        }

        .theme-btn:active { transform: scale(0.95); }

        /* --- Glass Navigation --- */
        .nav-wrap {
            position: relative;
            z-index: 100;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            margin-top: 0;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 6px;
            border-radius: 100px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px var(--shadow);
            transition: all 0.4s var(--ease);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            flex-shrink: 0;
            background: transparent;
            border: none;
            padding: 10px 22px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s var(--ease);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .tab-btn:hover { color: var(--text); background: rgba(99, 102, 241, 0.08); }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* --- Module Container --- */
        .module {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 100vw;
            padding: 0 16px;
            animation: none;
        }

        .module.active { display: flex; }

        /* --- Flashcard Scene --- */
        .scene {
            width: min(420px, 92vw);
            height: min(340px, 56vh);
            perspective: 1200px;
            cursor: pointer;
            position: relative;
            margin-top: 24px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s var(--ease);
            transform-style: preserve-3d;
            border-radius: var(--radius);
            box-shadow:
                0 4px 6px -2px var(--shadow),
                0 12px 24px -4px var(--shadow-lg),
                0 24px 48px -8px rgba(99, 102, 241, 0.08);
        }

        .card.flipped { transform: rotateY(180deg); }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            border-radius: var(--radius);
            padding: 28px 24px;
            border: 1px solid var(--border);
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.4s var(--ease);
            box-sizing: border-box;
        }

        .face-front {
            background: var(--surface);
            gap: 12px;
        }

        .face-back {
            background: var(--surface-dark);
            transform: rotateY(180deg);
            color: var(--text-dark);
            border-color: var(--primary);
        }

        .mcq-back {
            background: var(--surface-dark-alt);
            border-top: 4px solid var(--success);
        }

        /* --- Card Content --- */
        .urdu {
            font-family: 'Noto Nastaliq Urdu', serif;
            font-size: 38px;
            font-weight: 700;
            direction: rtl;
            text-align: center;
            color: var(--text);
            line-height: 1.4;
            transition: color 0.4s var(--ease);
        }

        .en-word {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #fff;
            margin-bottom: 8px;
        }

        .meaning {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-dark-muted);
            max-width: 90%;
        }

        .mcq-q {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text);
            transition: color 0.4s var(--ease);
        }

        .mcq-a {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.4;
            color: #fff;
        }

        .q-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .a-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--success);
            margin-bottom: 12px;
        }

        /* --- Hook --- */
        .hook-wrap {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 40px;
        }

        .hook-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 100px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            color: var(--text-muted);
            font-weight: 500;
            transition: all 0.2s var(--ease);
        }

        .hook-btn:hover {
            background: var(--surface-alt);
            color: var(--text);
            border-color: var(--primary);
        }

        .hook-text {
            display: none;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
            animation: fadeSlideIn 0.3s var(--ease);
        }

        .hook-text.show { display: block; }

        /* --- Controls --- */
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 28px;
            width: 100%;
            max-width: 420px;
            justify-content: center;
        }

        .nav-btn {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s var(--ease);
            box-shadow: 0 2px 4px var(--shadow);
            -webkit-tap-highlight-color: transparent;
            flex: 1;
        }

        .nav-btn:hover {
            background: var(--surface-alt);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .nav-btn:active { transform: translateY(0); }

        .counter {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 9px 16px;
            font-variant-numeric: tabular-nums;
            min-width: 60px;
            text-align: center;
            transition: all 0.4s var(--ease);
            font-family: 'JetBrains Mono', monospace;
        }

        .instruction {
            margin-top: 12px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }

        /* ============================================================
           📜  TIMELINE (Horizontal Scroll)
           ============================================================ */

        .timeline-area {
            width: 100vw;
            height: 420px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 20px 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }

        .timeline-area::-webkit-scrollbar { display: none; }

        .timeline {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            position: relative;
            padding-top: 100px;
            padding-left: 5vw;
            padding-right: 5vw;
            width: max-content;
            height: 100%;
        }

        .timeline::before {
            content: '';
            position: absolute;
            top: 100px;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--border), var(--primary), var(--border));
            z-index: 1;
        }

        .tl-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        .tl-item.empty {
            width: 28px;
            margin-right: 4px;
        }

        .tl-item.event {
            width: 260px;
            margin: 0 16px;
        }

        .tl-dot {
            position: absolute;
            top: -12px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--border);
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
        }

        .tl-item.empty .tl-dot {
            left: 50%;
            transform: translateX(-50%);
        }

        .tl-item.event .tl-dot {
            top: -18px;
            width: 36px;
            height: 36px;
            background: var(--primary);
            color: #fff;
            border: 4px solid var(--surface-alt);
            font-size: 12px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            left: 50%;
            transform: translateX(-50%);
        }

        .tl-card {
            margin-top: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            box-shadow: 0 4px 12px var(--shadow);
            width: 100%;
            text-align: left;
            position: relative;
            transition: all 0.3s var(--ease);
        }

        .tl-card:hover {
            box-shadow: 0 8px 24px var(--shadow);
            transform: translateY(-2px);
        }

        .tl-card::before {
            content: '';
            position: absolute;
            top: -24px;
            left: 50%;
            width: 2px;
            height: 24px;
            background: var(--primary);
        }

        .tl-text {
            font-size: 14px;
            color: var(--text);
            line-height: 1.5;
        }

        /* --- Month groups --- */
        .month-group {
            display: flex;
            flex-direction: row;
            position: relative;
            margin-right: 40px;
        }

        .month-label {
            position: absolute;
            top: -80px;
            left: 10px;
            font-size: 60px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 4px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            transition: color 0.4s var(--ease);
        }

        /* ============================================================
           📱  MOBILE
           ============================================================ */

        @media (max-width: 650px) {
            body {
                justify-content: flex-start;
                padding-top: 6vh;
            }

            .nav-wrap {
                position: fixed;
                bottom: 16px;
                left: 50%;
                transform: translateX(-50%);
                width: 92vw;
                z-index: 1000;
            }

            .nav-tabs {
                padding: 4px;
                gap: 4px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            }

            .tab-btn {
                padding: 10px 14px;
                font-size: 12px;
            }

            .theme-btn {
                top: 12px;
                right: 12px;
                width: 38px;
                height: 38px;
                font-size: 16px;
            }

            .scene {
                width: 94vw;
                height: 50vh;
                min-height: 280px;
                max-height: 400px;
                margin-top: 12px;
            }

            .face { padding: 20px; }

            .urdu { font-size: 28px; }

            .en-word { font-size: 22px; }

            .meaning { font-size: 14px; }

            .mcq-q { font-size: 15px; }

            .mcq-a { font-size: 20px; }

            .controls {
                width: 94vw;
                gap: 8px;
                margin-top: 16px;
            }

            .nav-btn {
                padding: 12px 0;
                font-size: 13px;
            }

            .instruction { display: none; }

            .timeline-area {
                height: calc(100dvh - 140px);
                padding-top: 10px;
            }

            .timeline {
                padding-top: 60px;
            }

            .timeline::before { top: 60px; }

            .month-label {
                font-size: 32px;
                top: -55px;
                opacity: 0.4;
            }

            .tl-item.event { width: 200px; }
            .tl-item.empty { width: 16px; }
            .tl-card { padding: 12px; margin-top: 30px; }
        }

        /* ============================================================
           ✨  ANIMATIONS
           ============================================================ */

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .module.active .scene { animation: slideUp 0.4s var(--ease); }

        /* ============================================================
           🎯  UTILITIES
           ============================================================ */

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }

        [role="tablist"] { outline: none; }

        /* --- Focus ring --- */
        .tab-btn:focus-visible,
        .nav-btn:focus-visible,
        .theme-btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* ============================================================
           🧠  DATA (injected via JS)
           ============================================================ */

        /* --- progress --- */
        .progress-bar {
            width: 100%;
            max-width: 420px;
            height: 4px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
            transition: background 0.4s var(--ease);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.4s var(--ease);
            border-radius: 4px;
        }
    </style>
</head>
<body data-theme="light">

    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle dark/light mode">🌙</button>

    <nav class="nav-wrap" role="tablist" aria-label="Study modules">
        <div class="nav-tabs" id="nav-tabs">
            <button class="tab-btn active" role="tab" aria-selected="true" data-tab="vocab" onclick="switchTab('vocab')">📖 Vocab</button>
            <button class="tab-btn" role="tab" aria-selected="false" data-tab="mcq" onclick="switchTab('mcq')">🧠 GK MCQs</button>
            <button class="tab-btn" role="tab" aria-selected="false" data-tab="timeline" onclick="switchTab('timeline')">📜 Timeline</button>
            <button class="tab-btn" role="tab" aria-selected="false" data-tab="cal" onclick="switchTab('cal')">📅 Calendar</button>
        </div>
    </nav>

    <!-- ============================================================
    📖 VOCAB MODULE
    ============================================================ -->

    <div class="module active" id="mod-vocab" role="tabpanel" aria-label="Vocabulary flashcards">
        <div class="scene" onclick="flipCard('c-vocab')" role="button" aria-label="Tap to flip">
            <div class="card" id="c-vocab">
                <div class="face face-front">
                    <div class="urdu" id="v-urdu">Loading…</div>
                    <div class="hook-wrap" onclick="event.stopPropagation()">
                        <button class="hook-btn" onclick="toggleHook(this)" aria-label="Show memory hook">💡 Hook</button>
                        <div class="hook-text" id="v-hook">—</div>
                    </div>
                </div>
                <div class="face face-back">
                    <div class="en-word" id="v-en">Loading</div>
                    <div class="meaning" id="v-meaning">Meaning</div>
                </div>
            </div>
        </div>

        <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
            <div class="progress-fill" id="v-progress" style="width: 0%"></div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="prevItem('vocab')" aria-label="Previous">← Prev</button>
            <span class="counter" id="v-counter"><span id="v-idx">1</span>/<span id="v-total">97</span></span>
            <button class="nav-btn" onclick="nextItem('vocab')" aria-label="Next">Next →</button>
        </div>
    </div>

    <!-- ============================================================
    🧠 GK MCQ MODULE
    ============================================================ -->

    <div class="module" id="mod-mcq" role="tabpanel" aria-label="GK MCQs">
        <div class="scene" onclick="flipCard('c-mcq')" role="button" aria-label="Tap to reveal answer">
            <div class="card" id="c-mcq">
                <div class="face face-front">
                    <div class="q-label">❓ Question</div>
                    <div class="mcq-q" id="mcq-q">Loading…</div>
                </div>
                <div class="face face-back mcq-back">
                    <div class="a-label">✅ Answer</div>
                    <div class="mcq-a" id="mcq-a">Loading…</div>
                </div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="m-progress" style="width: 0%"></div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="prevItem('mcq')" aria-label="Previous">← Prev</button>
            <span class="counter" id="m-counter"><span id="m-idx">1</span>/<span id="m-total">70</span></span>
            <button class="nav-btn" onclick="nextItem('mcq')" aria-label="Next">Next →</button>
        </div>
    </div>

    <!-- ============================================================
    📜 TIMELINE MODULE
    ============================================================ -->

    <div class="module" id="mod-timeline" role="tabpanel" aria-label="Historical milestones">
        <div class="timeline-area" id="tl-scroll">
            <div class="timeline" id="tl-container"></div>
        </div>
        <div class="instruction" style="margin-top: 8px;">← Swipe / scroll to explore →</div>
    </div>

    <!-- ============================================================
    📅 CALENDAR MODULE
    ============================================================ -->

    <div class="module" id="mod-cal" role="tabpanel" aria-label="Annual calendar">
        <div class="timeline-area" id="cal-scroll">
            <div class="timeline" id="cal-container"></div>
        </div>
        <div class="instruction" style="margin-top: 8px;">← 365 days of events →</div>
    </div>

    <script>
        /* ============================================================
           🧪  DATA
           ============================================================ */

        const words = [
            { urdu: "تسلی دینا", eng: "To Console", meaning: "To comfort someone who is sad or disappointed.", hook: "Handing a gaming 'console' to a crying friend." },
            { urdu: "تباہ کن", eng: "Catastrophic", meaning: "Causing sudden, widespread disaster and immense damage.", hook: "A massive earthquake destroying a city." },
            { urdu: "فرق کرنا", eng: "To Distinguish", meaning: "To recognize or point out the difference between things.", hook: "'Dis-ting-wish' you could tell twins apart." },

        }

        const saved = localStorage.getItem('appTheme');
        if (saved) {
            document.body.setAttribute('data-theme', saved);
            document.getElementById('theme-btn').textContent = saved === 'dark' ? '☀️' : '🌙';
        }

        // --- Tab switching ---
        function switchTab(tab) {
            currentTab = tab;
            ['vocab', 'mcq', 'timeline', 'cal'].forEach(t => {
                const mod = document.getElementById('mod-' + t);
                const btn = document.querySelector(`[data-tab="${t}"]`);
                mod.classList.toggle('active', t === tab);
                btn?.classList.toggle('active', t === tab);
                btn?.setAttribute('aria-selected', t === tab ? 'true' : 'false');
            });
        }

        // --- Card flip ---
        function flipCard(id) {
            document.getElementById(id).classList.toggle('flipped');
        }

        // --- Hook toggle ---
        function toggleHook(btn) {
            const text = btn.nextElementSibling;
            text.classList.toggle('show');
        }

        // --- Navigation ---
        function updateVocab(i) {
            const w = words[i];
            document.getElementById('v-urdu').textContent = w.urdu;
            document.getElementById('v-en').textContent = w.eng;
            document.getElementById('v-meaning').textContent = w.meaning;
            document.getElementById('v-hook').textContent = w.hook || '—';
            document.getElementById('v-idx').textContent = i + 1;
            document.getElementById('v-progress').style.width = ((i + 1) / words.length * 100) + '%';
        }

        function updateMCQ(i) {
            const m = mcqs[i];
            document.getElementById('mcq-q').textContent = m.q;
            document.getElementById('mcq-a').textContent = m.a;
            document.getElementById('m-idx').textContent = i + 1;
            document.getElementById('m-progress').style.width = ((i + 1) / mcqs.length * 100) + '%';
        }

        function nextItem(mode) {
            if (mode === 'vocab') {
                vIdx = (vIdx + 1) % words.length;
                const c = document.getElementById('c-vocab');
                if (c.classList.contains('flipped')) c.classList.remove('flipped');
                setTimeout(() => updateVocab(vIdx), 300);
            } else {
                mIdx = (mIdx + 1) % mcqs.length;
                const c = document.getElementById('c-mcq');
                if (c.classList.contains('flipped')) c.classList.remove('flipped');
                setTimeout(() => updateMCQ(mIdx), 300);
            }
        }

        function prevItem(mode) {
            if (mode === 'vocab') {
                vIdx = (vIdx - 1 + words.length) % words.length;
                const c = document.getElementById('c-vocab');
                if (c.classList.contains('flipped')) c.classList.remove('flipped');
                setTimeout(() => updateVocab(vIdx), 300);
            } else {
                mIdx = (mIdx - 1 + mcqs.length) % mcqs.length;
                const c = document.getElementById('c-mcq');
                if (c.classList.contains('flipped')) c.classList.remove('flipped');
                setTimeout(() => updateMCQ(mIdx), 300);
            }
        }

        // --- Build timelines ---
        function buildTimelines() {
            // Historical
            const tl = document.getElementById('tl-container');
            historicalData.forEach(d => {
                const el = document.createElement('div');
                el.className = 'tl-item event';
                el.innerHTML = `
                    <div class="tl-dot">${d.marker.split(' ')[0]}</div>
                    <div class="tl-card"><div class="tl-text">${d.text}</div></div>
                `;
                tl.appendChild(el);
            });

            // Calendar
            const cal = document.getElementById('cal-container');
            calendarMonths.forEach(m => {
                const g = document.createElement('div');
                g.className = 'month-group';
                let html = `<div class="month-label">${m.name}</div>`;
                for (let d = 1; d <= m.days; d++) {
                    const e = annualEvents[m.name]?.[d];
                    if (e) {
                        html += `
                            <div class="tl-item event">
                                <div class="tl-dot">${d}</div>
                                <div class="tl-card"><div class="tl-text">${e}</div></div>
                            </div>
                        `;
                    } else {
                        html += `<div class="tl-item empty"><div class="tl-dot">${d}</div></div>`;
                    }
                }
                g.innerHTML = html;
                cal.appendChild(g);
            });
        }

        buildTimelines();
        updateVocab(0);
        updateMCQ(0);

        // --- Keyboard ---
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') nextItem(currentTab === 'vocab' ? 'vocab' : 'mcq');
            if (e.key === 'ArrowLeft') prevItem(currentTab === 'vocab' ? 'vocab' : 'mcq');
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                const id = currentTab === 'vocab' ? 'c-vocab' : 'c-mcq';
                flipCard(id);
            }
        });

        // --- Wheel scroll for timelines ---
        document.querySelectorAll('.timeline-area').forEach(a => {
            a.addEventListener('wheel', e => {
                if (e.deltaY) {
                    e.preventDefault();
                    a.scrollLeft += e.deltaY;
                }
            }, { passive: false });
        });
    </script>
</body>
</html>
