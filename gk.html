<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GK — Master Study Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito+Sans:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

    <div class="app-container">

        <div class="header">
            <div class="header-top">
                <!-- "Home" back-link: routes back to the landing page.
                     All styling lives in styles.css under .header-home-link
                     (per rules.md: no inline magic numbers / event handlers). -->
                <a href="./index.html" class="header-home-link" aria-label="Back to home" title="Back to home">
                    <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    <span>Home</span>
                </a>
                <h1>general knowledge</h1>
                <button class="btn-header" onclick="shuffleDeck()">Shuffle</button>
            </div>
            <div class="progress-container">
                <div class="progress-header">
                    <span class="progress-text">Progress</span>
                    <div>
                        <span class="progress-text timer-text" id="timer-display">00:00</span>
                        <span class="progress-text" id="progress-text-count">1 / 160</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </div>

        <div class="card-wrapper">
            <div class="card-scene" id="card-scene">
                <div class="card" id="flashcard">
                    <div class="card-face card-front">
                        <div class="card-label">Question</div>
                        <div class="card-content" id="card-question">Loading...</div>
                        <div class="instruction">Double-tap to flip<br>Swipe left/right to navigate</div>
                    </div>
                    <div class="card-face card-back">
                        <div class="card-label">Answer</div>
                        <div class="card-content" id="card-answer">Loading...</div>
                        <div class="instruction">Double-tap to flip<br>Swipe left/right to navigate</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-nav" id="btn-prev" onclick="prevCard()">Prev</button>
            <button class="btn-primary" id="btn-flip" onclick="flipCard()">Flip Card</button>
            <button class="btn-nav" id="btn-next" onclick="nextCard()">Next</button>
        </div>

    </div>

    <!-- Classic scripts (not type="module") so file:// still works.
         Order matters: data.js MUST load before app.js so `originalData`
         is defined when app.js initializes. -->
    <script src="./data.js"></script>
    <script src="./app.js"></script>
</body>
</html>
