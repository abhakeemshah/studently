<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duolingo-Style Flashcards - Lesson Path</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Duolingo Brand Tokens */
            --color-duo-green: #58cc02;
            --color-duo-green-shadow: #3f8f01;
            --color-duo-green-light: #d7ffb8;
            --color-sky-blue: #1cb0f6;
            --color-sky-blue-shadow: #1899d6;
            --color-snow-white: #ffffff;
            --color-cloud-gray: #e5e5e5;
            --color-cloud-gray-shadow: #c9c9c9;
            --color-almost-black: #3c3c3c;
            --color-graphite: #777777;
            --color-silver: #afafaf;
            
            --font-feather: 'Fredoka One', cursive;
            --font-din-round: 'Nunito Sans', sans-serif;
            
            --radius-cards: 16px;
            --radius-buttons: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* --- Custom Scrollbar --- */
        html {
            scrollbar-width: thin;
            scrollbar-color: var(--color-cloud-gray-shadow) transparent;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-cloud-gray-shadow); 
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-silver);
        }
        /* ---------------------------------- */

        body {
            background-color: var(--color-snow-white);
            color: var(--color-almost-black);
            font-family: var(--font-din-round);
            letter-spacing: 0.053em;
            line-height: 1.5;
            padding: 40px 24px 60px 24px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1140px;
            margin: 0 auto;
        }

        /* Top Navigation Bar */
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--color-cloud-gray);
        }

        .nav-btn {
            background-color: var(--color-snow-white);
            color: var(--color-sky-blue);
            border: 2px solid var(--color-cloud-gray);
            box-shadow: 0 4px 0 var(--color-cloud-gray);
            width: 48px;
            height: 48px;
            border-radius: var(--radius-buttons);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }

        .nav-btn:disabled {
            color: var(--color-silver);
            cursor: not-allowed;
            opacity: 0.5;
        }

        .nav-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* Progress Bar */
        .progress-wrapper {
            flex-grow: 1;
            height: 16px;
            background-color: var(--color-cloud-gray);
            border-radius: 8px;
            margin: 0 32px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--color-duo-green);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 8px;
            box-shadow: inset 0 4px 0 rgba(255,255,255,0.2); 
        }

        /* Carousel Layout */
        .slider-viewport {
            width: 100%;
            overflow: hidden; /* Clips extra white space from shorter slides */
            position: relative;
            transition: height 0.4s ease; /* Smoothly animates height changes */
        }

        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            align-items: flex-start;
        }

        .slide {
            min-width: 100%;
            padding: 0 12px;
        }

        /* Slide Headers */
        .category-header {
            margin-bottom: 32px;
            text-align: center;
        }

        .category-header h2 {
            font-family: var(--font-feather);
            font-size: 36px;
            color: var(--color-almost-black);
            margin: 0;
            letter-spacing: -0.02em;
        }

        .category-header p {
            color: var(--color-graphite);
            font-weight: 700;
            margin-top: 8px;
        }

        /* General Controls */
        .global-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .btn {
            font-family: var(--font-din-round);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.053em;
            text-transform: uppercase;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-buttons);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }

        .btn-primary {
            background-color: var(--color-duo-green);
            color: var(--color-snow-white);
            box-shadow: 0 4px 0 var(--color-duo-green-shadow);
        }

        .btn-secondary {
            background-color: var(--color-snow-white);
            color: var(--color-sky-blue);
            border: 2px solid var(--color-cloud-gray);
            box-shadow: 0 4px 0 var(--color-cloud-gray);
        }

        /* Flashcard Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            padding-bottom: 24px;
        }

        /* 3D Flip Card Implementation */
        .flashcard-wrapper {
            perspective: 1000px;
            height: 220px;
        }

        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard-wrapper.revealed .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--radius-cards);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--color-snow-white);
        }

        .flashcard-front {
            border: 2px solid var(--color-cloud-gray);
            border-bottom: 6px solid var(--color-cloud-gray-shadow);
            transition: all 0.1s ease;
        }
        
        .flashcard-wrapper:hover .flashcard-front {
            background-color: #fcfcfc;
        }

        .flashcard-wrapper:active .flashcard-front {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        .card-number {
            position: absolute;
            top: 16px;
            left: 20px;
            font-size: 15px;
            font-weight: 800;
            color: var(--color-silver);
        }

        .card-word {
            font-size: 22px;
            font-weight: 800;
            color: var(--color-almost-black);
        }

        .flip-hint {
            position: absolute;
            bottom: 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-silver);
            text-transform: uppercase;
        }

        .flashcard-back {
            background-color: var(--color-duo-green-light);
            border: 2px solid var(--color-duo-green);
            border-bottom: 6px solid var(--color-duo-green-shadow);
            transform: rotateY(180deg);
        }

        .card-meaning {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-almost-black);
            line-height: 1.4;
        }

        /* Floating Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--color-sky-blue);
            color: var(--color-snow-white);
            box-shadow: 0 4px 0 var(--color-sky-blue-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-to-top.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .back-to-top svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="top-nav" id="topAnchor">
            <button class="nav-btn" id="prevBtn" onclick="moveSlide(-1)" aria-label="Previous Section">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
            </button>
            
            <div class="progress-wrapper">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <button class="nav-btn" id="nextBtn" onclick="moveSlide(1)" aria-label="Next Section">
                <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>

        <div class="global-controls">
            <button class="btn btn-secondary" onclick="hideAll()">Reset Cards</button>
            <button class="btn btn-primary" onclick="revealAll()">Reveal All</button>
        </div>

        <div class="slider-viewport" id="sliderViewport">
            <div class="slider-track" id="sliderTrack">
                </div>
        </div>

    </div>

    <button class="btn back-to-top" id="backToTopBtn" onclick="scrollToTop()">
        <svg viewBox="0 0 24 24"><path d="M5 15l7-7 7 7" /></svg>
        TOP
    </button>

    <script>
        // Full 97-word dataset
        const vocabData = {
            "1. Negotiation, Diplomacy & Conflict": [
                {"word": "Trade-Off", "meaning": "A balance achieved between two desirable but incompatible things; giving up one thing to get another."},
                {"word": "Back And Forth", "meaning": "Repeated movement, discussion, or negotiation between two sides (e.g., 'back and forth talks')."},
                {"word": "Interlocutors", "meaning": "The people participating in a conversation, dialogue, or diplomatic negotiation."},
                {"word": "To Yield", "meaning": "To give way, surrender, or agree to a demand (e.g., 'yielding territory')."},
                {"word": "Sticking Point", "meaning": "A specific issue in a negotiation that prevents an agreement from being reached."},
                {"word": "Deadlock", "meaning": "A situation where no progress can be made because of complete disagreement (a standoff)."},
                {"word": "Concession", "meaning": "Something you give up or agree to during a negotiation to reach a compromise."},
                {"word": "Gambit", "meaning": "A calculated action or opening move intended to gain an advantage (from chess)."},
                {"word": "To Hammer Out", "meaning": "To negotiate and reach an agreement through intense, prolonged discussion."},
                {"word": "To Confront", "meaning": "To face a hostile force, problem, or person head-on."},
                {"word": "Aggressor", "meaning": "The country, group, or person that attacks first or initiates a conflict."},
                {"word": "Abdication", "meaning": "The act of a leader (like a king or CEO) formally stepping down or giving up their power/duty."},
                {"word": "Turn The Page", "meaning": "To move on from a difficult past event and start fresh."},
                {"word": "Onus", "meaning": "The burden of responsibility or proof."}
            ],
            "2. Obstacles, Limits & Severe Risks": [
                {"word": "To Constrain", "meaning": "To limit, restrict, or hold something back."},
                {"word": "In The Way Of", "meaning": "Blocking progress; acting as an obstacle to something."},
                {"word": "Hurdle", "meaning": "A problem or difficulty that must be overcome to achieve something."},
                {"word": "To Cripple", "meaning": "To cause severe damage so that something can no longer function."},
                {"word": "Rigidity", "meaning": "Inflexibility; refusing to change rules or behavior even when necessary."},
                {"word": "Redundancy", "meaning": "The state of being no longer needed, or having extra backup copies."},
                {"word": "Vulnerable", "meaning": "Exposed to the possibility of being attacked or harmed."},
                {"word": "Fragility", "meaning": "The noun form of vulnerability; the quality of being easily broken or damaged."},
                {"word": "Catastrophic", "meaning": "Involving or causing sudden, immense disaster and suffering."},
                {"word": "Doomsday", "meaning": "The day of final judgment, or a hypothetical end-of-the-world scenario."},
                {"word": "Red Flag", "meaning": "A warning sign indicating danger or a fundamental problem."},
                {"word": "Consequences", "meaning": "The severe results or fallout of an action."},
                {"word": "To Backfire", "meaning": "When a plan has the exact opposite effect of what was intended, harming the planner."},
                {"word": "Excessive", "meaning": "Going beyond normal, acceptable limits; too much of something."}
            ],
            "3. Clarity, Analysis & Information": [
                {"word": "To Distinguish", "meaning": "To recognize what makes something different; to tell the difference."},
                {"word": "To Posit", "meaning": "To assume something as a fact or starting point for an argument."},
                {"word": "To Assess", "meaning": "To evaluate, estimate, or judge the nature and quality of something."},
                {"word": "Precise", "meaning": "Exact, accurate, and specific in detail."},
                {"word": "Ambiguous", "meaning": "Unclear, vague, or open to multiple interpretations."},
                {"word": "Explicit", "meaning": "Stated clearly and in detail, leaving no room for confusion."},
                {"word": "Hypothetical", "meaning": "Imagined or theoretical; a 'what if' scenario that isn't real yet."},
                {"word": "To Emphasize", "meaning": "To give special importance or prominence to a point or fact."},
                {"word": "Bears Repeating", "meaning": "A phrase meaning a point is so important that it should be said again."},
                {"word": "Synthesis", "meaning": "The combination of different ideas, data, or components to form a coherent whole."},
                {"word": "To Unearth", "meaning": "To discover hidden, buried, or secret information through investigation."},
                {"word": "Insinuation", "meaning": "An indirect, subtle suggestion or hint, usually of something negative."},
                {"word": "To Parrot", "meaning": "To mindlessly repeat what someone else has said without understanding it."},
                {"word": "To Dilute", "meaning": "To make something weaker in force, content, or value."},
                {"word": "Manifestation", "meaning": "A visible, physical sign or proof of an underlying feeling or abstract idea."}
            ],
            "4. Depth, Scale & Scope": [
                {"word": "Shallow", "meaning": "Lacking depth; superficial and ignoring the root causes."},
                {"word": "Profound", "meaning": "Very deep, intense, or far-reaching; having a massive structural impact."},
                {"word": "Holistic", "meaning": "Looking at the 'big picture'; treating a system as a whole rather than just its parts."},
                {"word": "Diverse", "meaning": "Showing a great deal of variety; consisting of many different elements."},
                {"word": "Realm", "meaning": "A kingdom, or a specific field/sphere of activity or knowledge."},
                {"word": "To Encircle", "meaning": "To form a circle around; to surround completely."}
            ],
            "5. Trends, Paths & Time": [
                {"word": "Zags Away", "meaning": "To make a sudden, sharp, and unpredictable change in direction."},
                {"word": "Inevitable", "meaning": "Certain to happen; completely unavoidable."},
                {"word": "Tend To", "meaning": "To regularly behave in a certain way or have a strong likelihood of happening."},
                {"word": "Eventually", "meaning": "In the end, especially after a long delay, dispute, or series of problems."},
                {"word": "Fate", "meaning": "The development of events beyond a person's control; destiny."},
                {"word": "To Leap", "meaning": "To jump or move suddenly and significantly."}
            ],
            "6. Rules, Duties & Importance": [
                {"word": "To Abide", "meaning": "To accept and act in accordance with a rule, decision, or law."},
                {"word": "To Adhere", "meaning": "To stick fast to, or to follow a practice/belief strictly."},
                {"word": "Obligation", "meaning": "A moral or legal duty to do something."},
                {"word": "Crucial", "meaning": "Extremely important, essential, or absolutely necessary for success."},
                {"word": "Flawless", "meaning": "Perfect in execution; without any defects or mistakes."},
                {"word": "To Stick", "meaning": "To remain fixed in a position or to persist in doing something."}
            ],
            "7. Human Emotions, Traits & Attitudes": [
                {"word": "To Console", "meaning": "To comfort someone in a time of grief or disappointment."},
                {"word": "Optimistic", "meaning": "Hopeful and confident about the future."},
                {"word": "Sincere", "meaning": "Free from pretense or deceit; proceeding from genuine feelings."},
                {"word": "Involuntary", "meaning": "Done without will or conscious control."},
                {"word": "Trait", "meaning": "A distinguishing quality or characteristic of a person or group."},
                {"word": "Temperament", "meaning": "A person's nature or general disposition."},
                {"word": "Compassion", "meaning": "Deep sympathy and a desire to help those who are suffering."},
                {"word": "To Cuddle", "meaning": "To hold close for warmth or comfort; to embrace affectionately."},
                {"word": "Batty", "meaning": "Crazy, irrational, or completely foolish."},
                {"word": "Bizarre", "meaning": "Very strange, unusual, or completely unexpected."},
                {"word": "To Fantasize", "meaning": "To indulge in daydreams or imagine things that are highly unlikely."},
                {"word": "To Fascinate", "meaning": "To attract strong interest and attention; to captivate."},
                {"word": "Low key", "meaning": "Quiet, restrained, or modest; deliberately not attracting attention."},
                {"word": "Screw Them", "meaning": "(Informal/Slang) A dismissive attitude showing anger or a refusal to cooperate."},
                {"word": "Obstinate", "meaning": "Stubbornly refusing to change one's mind or course of action."},
                {"word": "Fierce", "meaning": "Intense, aggressive, or highly competitive."}
            ],
            "8. Actions, Habits, Groups & Growth": [
                {"word": "To Tolerate", "meaning": "To allow the existence of something without interference; to endure."},
                {"word": "To Shun", "meaning": "To persistently avoid, ignore, or reject someone or something."},
                {"word": "To Recycle", "meaning": "To convert waste into reusable material; or to reuse an old idea."},
                {"word": "To Incline", "meaning": "To feel willing or favorably disposed toward doing something."},
                {"word": "To Ingrain", "meaning": "To firmly establish an attitude, habit, or belief so it cannot easily be changed."},
                {"word": "To Embody", "meaning": "To be a perfect example or physical representation of an idea or quality."},
                {"word": "To Accumulate", "meaning": "To gather together or acquire an increasing number or quantity."},
                {"word": "To Commemorate", "meaning": "To recall and show respect for someone or something in a ceremony or monument."},
                {"word": "Pursuit", "meaning": "The action of following or pursuing someone or something; the quest for a goal."},
                {"word": "Cult", "meaning": "A group with extreme, unorthodox beliefs, or (in business) an obsessive following."},
                {"word": "Cohort", "meaning": "A group of people banded together, or a specific demographic group studied together."},
                {"word": "Lucrative", "meaning": "Producing a great deal of profit; highly financially rewarding."},
                {"word": "Resilience", "meaning": "The capacity to recover quickly from difficulties; mental or economic toughness."},
                {"word": "To Cultivate", "meaning": "To carefully nurture, develop, or build a relationship or skill over time."},
                {"word": "To Hammer", "meaning": "To aggressively attack, criticize, or drive something down."}
            ],
            "9. Technical, Metaphorical & Transitions": [
                {"word": "Knob", "meaning": "A control dial. Metaphorically: A parameter that can be adjusted."},
                {"word": "Argmax", "meaning": "(Math/AI) The input value that produces the maximum output of a function."},
                {"word": "Low-Pass Filter", "meaning": "(Engineering) A filter that passes low frequencies but reduces high ones."},
                {"word": "Unlike", "meaning": "A preposition used to compare two things that are different."},
                {"word": "However", "meaning": "A transition word used to introduce a contrasting statement or fact."}
            ]
        };

        const themes = Object.keys(vocabData);
        const track = document.getElementById('sliderTrack');
        const viewport = document.getElementById('sliderViewport');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const backToTopBtn = document.getElementById('backToTopBtn');

        let currentSlide = 0;
        let globalIndex = 1;

        // Build the Slides
        themes.forEach((theme, index) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide';
            
            const titleParts = theme.split('-');
            const mainTitle = titleParts[0].trim();
            const subtitle = titleParts[1] ? titleParts[1].trim() : '';

            const headerHtml = `
                <div class="category-header">
                    <h2>${mainTitle}</h2>
                    ${subtitle ? `<p>${subtitle}</p>` : ''}
                </div>
            `;

            let gridHtml = `<div class="card-grid">`;
            
            vocabData[theme].forEach(item => {
                gridHtml += `
                    <div class="flashcard-wrapper" onclick="this.classList.toggle('revealed')">
                        <div class="flashcard-inner">
                            <div class="flashcard-front">
                                <span class="card-number">${globalIndex}</span>
                                <span class="card-word">${item.word}</span>
                                <span class="flip-hint">Click to flip</span>
                            </div>
                            <div class="flashcard-back">
                                <span class="card-meaning">${item.meaning}</span>
                            </div>
                        </div>
                    </div>
                `;
                globalIndex++;
            });

            gridHtml += `</div>`;
            slideDiv.innerHTML = headerHtml + gridHtml;
            track.appendChild(slideDiv);
        });

        // Navigation & Slider Logic
        function updateSlider() {
            // Move the track horizontally
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === themes.length - 1;

            const progressPercentage = ((currentSlide + 1) / themes.length) * 100;
            progressFill.style.width = `${progressPercentage}%`;

            // Auto-adjust container height to clip empty white space on shorter slides
            const activeSlide = track.children[currentSlide];
            if (activeSlide) {
                viewport.style.height = activeSlide.offsetHeight + 'px';
            }
        }

        function moveSlide(direction) {
            currentSlide += direction;
            if (currentSlide < 0) currentSlide = 0;
            if (currentSlide >= themes.length) currentSlide = themes.length - 1;
            
            updateSlider();
            scrollToTop(); // Optional: Automatically jump to top when changing context
        }

        // Action Buttons
        function revealAll() {
            const activeSlide = track.children[currentSlide];
            activeSlide.querySelectorAll('.flashcard-wrapper').forEach(card => {
                card.classList.add('revealed');
            });
        }

        function hideAll() {
            document.querySelectorAll('.flashcard-wrapper').forEach(card => {
                card.classList.remove('revealed');
            });
        }

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // Floating Back to Top Button Logic
        window.addEventListener('scroll', () => {
            // Show button if scrolled down more than 200px
            if (window.scrollY > 200) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        });

        // Re-calculate height if user resizes the window
        window.addEventListener('resize', () => {
            const activeSlide = track.children[currentSlide];
            if (activeSlide) {
                viewport.style.height = activeSlide.offsetHeight + 'px';
            }
        });

        // Initialize state (setTimeout ensures DOM has painted before measuring height)
        setTimeout(updateSlider, 50);

    </script>
</body>
</html>
