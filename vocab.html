<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary — Master Study Hub</title>
    <meta name="description" content="Vocabulary trainer — 103 curated English words across 9 themes. Click to flip a card and reveal the meaning. From negotiation to nuances, build your word power one card at a time.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./landing.css">
    <!-- All topbar/page-backdrop/footer styling comes from landing.css so the
         design system stays centralized (per rules.md §5: no inline magic
         numbers / event handlers). Vocab-specific flashcard styles are
         scoped under .vocab-* and live below because they don't recur on
         any other page. -->
    <style>
        /* === 1. Layout: themed slide carousel above the footer === */
        .vocab-stage {
            max-width: 1140px;
            margin: 0 auto;
            padding: 32px 24px 80px;
            box-sizing: border-box;
        }

        /* === 2. Top nav row: prev / progress / next === */
        .vocab-stage-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--color-cloud-gray);
        }

        .vocab-nav-btn {
            background-color: var(--color-snow-white);
            color: var(--color-sky-blue);
            border: 2px solid var(--color-cloud-gray);
            box-shadow: 0 4px 0 var(--color-cloud-gray);
            width: 48px;
            height: 48px;
            border-radius: var(--radius-buttons, 12px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .vocab-nav-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }
        .vocab-nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            color: var(--color-silver);
        }
        .vocab-nav-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .vocab-progress-wrapper {
            flex-grow: 1;
            height: 16px;
            background-color: var(--color-cloud-gray);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        .vocab-progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--color-duo-green);
            border-radius: 8px;
            box-shadow: inset 0 4px 0 rgba(255,255,255,0.25);
            transition: width 0.4s ease;
        }

        /* === 3. Theme-level action row: reset / reveal all === */
        .vocab-stage-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
        }

        .vocab-btn {
            font-family: var(--font-din-round, 'Nunito Sans', sans-serif);
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.053em;
            text-transform: uppercase;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-buttons, 12px);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .vocab-btn:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }
        .vocab-btn-primary {
            background-color: var(--color-duo-green);
            color: var(--color-snow-white);
            box-shadow: 0 4px 0 var(--shadow-primary);
        }
        .vocab-btn-secondary {
            background-color: var(--color-snow-white);
            color: var(--color-sky-blue);
            border: 2px solid var(--color-cloud-gray);
            box-shadow: 0 4px 0 var(--color-cloud-gray);
        }

        /* === 4. Slide carousel === */
        .vocab-slider-viewport {
            width: 100%;
            overflow: hidden;
            position: relative;
            transition: height 0.4s ease;
        }
        .vocab-slider-track {
            display: flex;
            align-items: flex-start;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .vocab-slide {
            min-width: 100%;
            padding: 0 12px;
            box-sizing: border-box;
        }

        .vocab-theme-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .vocab-theme-header h2 {
            font-family: var(--font-feather, 'Fredoka', sans-serif);
            font-size: 36px;
            color: var(--color-almost-black);
            margin: 0 0 8px;
            letter-spacing: -0.02em;
        }
        .vocab-theme-header p {
            color: var(--color-graphite);
            font-weight: 700;
            margin: 0;
        }

        /* === 5. Card grid + 3D flip cards === */
        .vocab-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
            padding-bottom: 24px;
        }

        .vocab-flip-card {
            perspective: 1000px;
            height: 220px;
        }
        .vocab-flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .vocab-flip-card.is-flipped .vocab-flip-card-inner {
            transform: rotateY(180deg);
        }

        .vocab-card-front,
        .vocab-card-back {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            border-radius: var(--radius-cards, 16px);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--color-snow-white);
            box-sizing: border-box;
        }

        .vocab-card-front {
            border: 2px solid var(--color-cloud-gray);
            border-bottom: 6px solid var(--color-cloud-gray);
            transition: all 0.1s ease;
        }
        .vocab-flip-card:not(.is-flipped):hover .vocab-card-front {
            background-color: #fcfcfc;
        }
        .vocab-flip-card:not(.is-flipped):active .vocab-card-front {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }

        .vocab-card-number {
            position: absolute;
            top: 16px;
            left: 20px;
            font-size: 15px;
            font-weight: 800;
            color: var(--color-silver);
        }

        .vocab-card-word {
            font-size: 22px;
            font-weight: 800;
            color: var(--color-almost-black);
            line-height: 1.2;
            padding: 0 8px;
            word-break: break-word;
        }

        .vocab-flip-hint {
            position: absolute;
            bottom: 16px;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-silver);
            text-transform: uppercase;
            letter-spacing: 0.053em;
        }

        .vocab-card-back {
            background-color: var(--color-duo-green-light);
            border: 2px solid var(--color-duo-green);
            border-bottom: 6px solid var(--shadow-primary);
            transform: rotateY(180deg);
        }
        .vocab-card-meaning {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-almost-black);
            line-height: 1.4;
            padding: 0 8px;
        }

        /* === 6. Floating back-to-top === */
        .vocab-back-to-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: var(--color-sky-blue);
            color: var(--color-snow-white);
            box-shadow: 0 4px 0 var(--color-sky-blue-shadow, #1899d6);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .vocab-back-to-top.is-visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .vocab-back-to-top svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* === 7. Mobile responsive === */
        /* ── Word Map graph styles (shared with GK page) ── */
        .vocab-graph-canvas-wrap {
            flex-grow: 1;
            position: relative;
            min-height: 400px;
            max-height: 560px;
            width: 100%;
            border-radius: var(--radius-cards, 16px);
            overflow: hidden;
            background: radial-gradient(ellipse at center, rgba(165,112,255,0.05) 0%, transparent 70%);
            margin-bottom: 8px;
        }
        .vocab-graph-canvas-wrap canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        .gk-graph-instruction {
            text-align: center;
            font-size: 12px;
            color: var(--color-silver);
            font-weight: 600;
            padding: 4px 0 8px;
            letter-spacing: 0.03em;
        }
        .gk-graph-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
            justify-content: center;
            padding: 8px 0 4px;
        }
        .gk-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--color-graphite);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .gk-legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Word Map toggle button in controls ── */
        .vocab-btn-wordmap {
            background-color: var(--color-snow-white);
            color: var(--color-sky-blue);
            border: 2px solid var(--color-cloud-gray);
            box-shadow: 0 4px 0 var(--color-cloud-gray);
            font-family: var(--font-din-round, 'Nunito Sans', sans-serif);
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 0.053em;
            text-transform: uppercase;
            padding: 12px 22px;
            border-radius: var(--radius-buttons, 12px);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .vocab-btn-wordmap:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }
        .vocab-btn-wordmap:hover {
            border-color: var(--color-sky-blue);
        }

        @media (max-width: 650px) {
            .vocab-stage { padding: 16px 16px 80px; }
            .vocab-theme-header h2 { font-size: 26px; }
            .vocab-flip-card { height: 200px; }
            .vocab-card-word { font-size: 18px; }
            .vocab-card-meaning { font-size: 13px; }
            .vocab-btn { padding: 12px 20px; font-size: 14px; }
            .vocab-nav-btn { width: 44px; height: 44px; }
            .vocab-card-grid { gap: 16px; }
        }
    </style>
</head>
<body data-theme="light">

    <div class="page-backdrop" aria-hidden="true"></div>

    <header class="topbar" role="banner">
        <a href="./index.html" class="brand" aria-label="Master Study Hub — home">
            <span class="brand-dot" aria-hidden="true"></span>
            <span>master study hub</span>
        </a>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch to dark mode" title="Switch theme">🌙</button>
    </header>

    <main class="vocab-stage" role="main">

        <!-- Theme navigation: previous theme, progress, next theme. -->
        <div class="vocab-stage-top" id="topAnchor">
            <button class="vocab-nav-btn" id="prevBtn" onclick="moveSlide(-1)" aria-label="Previous Theme">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 19l-7-7 7-7" /></svg>
            </button>

            <div class="vocab-progress-wrapper" aria-hidden="true">
                <div class="vocab-progress-fill" id="progressFill"></div>
            </div>

            <button class="vocab-nav-btn" id="nextBtn" onclick="moveSlide(1)" aria-label="Next Theme">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>

        <!-- Theme-level controls: reset/reveal every card on this theme. -->
        <div class="vocab-stage-controls">
            <button class="vocab-btn vocab-btn-secondary" onclick="hideAll()" type="button">Reset Cards</button>
            <button class="vocab-btn vocab-btn-primary" onclick="revealAll()" type="button">Reveal All</button>
            <button class="vocab-btn-wordmap" onclick="switchVocabView('map')" type="button" title="Explore word connections">
                🌐 Word Graph
            </button>
        </div>

        <!-- Theme carousel: each slide is a theme, builds from vocabData below. -->
        <div class="vocab-slider-viewport" id="sliderViewport">
            <div class="vocab-slider-track" id="sliderTrack">
                <!-- slides injected by JS -->
            </div>
        </div>

        <!-- ════════════════════════════════════════════
             Word Graph Section — 3D synonym graph
             ════════════════════════════════════════════ -->
        <div id="vocabGraphSection" style="display:none;">
            <div class="vocab-stage-top" style="margin-bottom:16px;margin-top:32px;">
                <button class="vocab-nav-btn" onclick="switchVocabView('cards')" aria-label="Back to cards" title="Back to cards">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 19l-7-7 7-7" /></svg>
                </button>
                <div style="flex-grow:1;text-align:center;">
                    <h2 style="font-family:var(--font-feather, 'Fredoka', sans-serif);font-size:24px;color:var(--color-almost-black);margin:0;letter-spacing:-0.02em;">
                        🌐 Word Graph
                    </h2>
                    <p style="margin:4px 0 0;font-size:13px;color:var(--color-graphite);font-weight:600;">
                        Synonym &amp; related-word connections across all themes
                    </p>
                </div>
                <div style="width:48px;"></div> <!-- spacer -->
            </div>

            <div class="vocab-graph-canvas-wrap" id="vocabGraphCanvasWrap">
                <canvas id="vocabGraphCanvas"></canvas>
            </div>
            <div class="gk-graph-instruction">Drag to rotate · Scroll to zoom · Tap a word to learn its meaning</div>
            <div class="gk-graph-legend" id="vocabGraphLegend"></div>
        </div>

    </main>

    <footer class="landing-footer" role="contentinfo">
        Made with <span aria-hidden="true">❤️</span> — no signup, no tracking, all progress stays on your device.
        &nbsp;·&nbsp;
        <a href="./index.html">Home</a>
        &nbsp;·&nbsp;
        <a href="./gk.html">GK</a>
    </footer>

    <button class="vocab-btn vocab-back-to-top" id="backToTopBtn" onclick="scrollToTop()" type="button" aria-label="Back to top">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 15l7-7 7 7" /></svg>
        TOP
    </button>

    <!--
        vocabData: full 103-word dataset spanning 9 themes. The 6 latest
        entries (Anticipating / Integration / Incentive / Oriented /
        Inclusive / Sine qua non) are tagged with a leading comment so
        future editorial passes can find them quickly. Theme keys use
        the format "<n>. <main> - <subtitle>"; the slide-build logic
        splits on " - " so a subtitle (e.g. "obstacles") still shows.
        The subtitle is optional — themes without " - " render only the
        main title (the keys pre-pend the number).
    -->
    <script>
        const vocabData = {
            "1. Negotiation, Diplomacy & Conflict - reaching agreement": [
                { word: "Trade-Off", meaning: "A balance achieved between two desirable but incompatible things; giving up one thing to get another." },
                { word: "Back And Forth", meaning: "Repeated movement, discussion, or negotiation between two sides (e.g., 'back and forth talks')." },
                { word: "Interlocutors", meaning: "The people participating in a conversation, dialogue, or diplomatic negotiation." },
                { word: "To Yield", meaning: "To give way, surrender, or agree to a demand (e.g., 'yielding territory')." },
                { word: "Sticking Point", meaning: "A specific issue in a negotiation that prevents an agreement from being reached." },
                { word: "Deadlock", meaning: "A situation where no progress can be made because of complete disagreement (a standoff)." },
                { word: "Concession", meaning: "Something you give up or agree to during a negotiation to reach a compromise." },
                { word: "Gambit", meaning: "A calculated action or opening move intended to gain an advantage (from chess)." },
                { word: "To Hammer Out", meaning: "To negotiate and reach an agreement through intense, prolonged discussion." },
                { word: "To Confront", meaning: "To face a hostile force, problem, or person head-on." },
                { word: "Aggressor", meaning: "The country, group, or person that attacks first or initiates a conflict." },
                { word: "Abdication", meaning: "The act of a leader formally stepping down or giving up their power/duty." },
                { word: "Turn The Page", meaning: "To move on from a difficult past event and start fresh." },
                { word: "Onus", meaning: "The burden of responsibility or proof." }
            ],
            "2. Obstacles, Limits & Severe Risks - barriers and warnings": [
                { word: "To Constrain", meaning: "To limit, restrict, or hold something back." },
                { word: "In The Way Of", meaning: "Blocking progress; acting as an obstacle to something." },
                { word: "Hurdle", meaning: "A problem or difficulty that must be overcome to achieve something." },
                { word: "To Cripple", meaning: "To cause severe damage so that something can no longer function." },
                { word: "Rigidity", meaning: "Inflexibility; refusing to change rules or behavior even when necessary." },
                { word: "Redundancy", meaning: "The state of being no longer needed, or having extra backup copies." },
                { word: "Vulnerable", meaning: "Exposed to the possibility of being attacked or harmed." },
                { word: "Fragility", meaning: "The noun form of vulnerability; the quality of being easily broken or damaged." },
                { word: "Catastrophic", meaning: "Involving or causing sudden, immense disaster and suffering." },
                { word: "Doomsday", meaning: "The day of final judgment, or a hypothetical end-of-the-world scenario." },
                { word: "Red Flag", meaning: "A warning sign indicating danger or a fundamental problem." },

            "3. Clarity, Analysis & Information - understanding data": [
                { word: "To Distinguish", meaning: "To recognize what makes something different; to tell the difference." },
                { word: "To Posit", meaning: "To assume something as a fact or starting point for an argument." },
                { word: "To Assess", meaning: "To evaluate, estimate, or judge the nature and quality of something." },
                { word: "Precise", meaning: "Exact, accurate, and specific in detail." },
                { word: "Ambiguous", meaning: "Unclear, vague, or open to multiple interpretations." },

            "8. Actions, Habits, Groups & Growth - active behaviors": [
                { word: "To Tolerate", meaning: "To allow the existence of something without interference; to endure." },
                { word: "To Shun", meaning: "To persistently avoid, ignore, or reject someone or something." },
                { word: "To Recycle", meaning: "To convert waste into reusable material; or to reuse an old idea." },
                { word: "To Incline", meaning: "To feel willing or favorably disposed toward doing something." },
                { word: "To Ingrain", meaning: "To firmly establish an attitude, habit, or belief so it cannot easily be changed." },
                { word: "To Embody", meaning: "To be a perfect example or physical representation of an idea or quality." },
                { word: "To Accumulate", meaning: "To gather together or acquire an increasing number or quantity." },
                { word: "To Commemorate", meaning: "To recall and show respect for someone or something in a ceremony or monument." },
                { word: "Pursuit", meaning: "The action of following or pursuing someone or something; the quest for a goal." },
                { word: "Cult", meaning: "A group with extreme, unorthodox beliefs, or (in business) an obsessive following." },
                { word: "Cohort", meaning: "A group of people banded together, or a specific demographic group studied together." },
                { word: "Lucrative", meaning: "Producing a great deal of profit; highly financially rewarding." },
                { word: "Resilience", meaning: "The capacity to recover quickly from difficulties; mental or economic toughness." },
                { word: "To Cultivate", meaning: "To carefully nurture, develop, or build a relationship or skill over time." },
                { word: "To Hammer", meaning: "To aggressively attack, criticize, or drive something down." },
                /* NEW 2026-07-12 */
                { word: "Incentive", meaning: "Something that motivates or encourages someone to act; a reward or benefit." }
            ],
            "9. Technical, Metaphorical & Transitions - specialized terms": [
                { word: "Knob", meaning: "A control dial. Metaphorically: A parameter that can be adjusted." },
                { word: "Argmax", meaning: "(Math/AI) The input value that produces the maximum output of a function." },
                { word: "Low-Pass Filter", meaning: "(Engineering) A filter that passes low frequencies but reduces high ones." },
                { word: "Unlike", meaning: "A preposition used to compare two things that are different." },
                { word: "However", meaning: "A transition word used to introduce a contrasting statement or fact." }
            ]
        };

        const themes = Object.keys(vocabData);
        const track = document.getElementById('sliderTrack');
        const viewport = document.getElementById('sliderViewport');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const backToTopBtn = document.getElementById('backToTopBtn');

        let currentSlide = 0;
        let globalIndex = 1;

        // --- Build slides from vocabData ---
        // Each theme key may be "<n>. <title> - <subtitle>". Split on " - "
        // so themes with subtitles render both the <h2> and the <p>;
        // themes without render only the title (subtitle => '' => <p> skipped).
        themes.forEach((theme) => {
            const slide = document.createElement('div');
            slide.className = 'vocab-slide';

            const themeParts = theme.split(' - ');
            const mainTitle = themeParts[0].trim();
            const subtitle = themeParts[1] ? themeParts[1].trim() : '';

            const header = document.createElement('div');
            header.className = 'vocab-theme-header';
            header.innerHTML =
                '<h2>' + mainTitle + '</h2>' +
                (subtitle ? '<p>' + subtitle + '</p>' : '');
            slide.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'vocab-card-grid';

            vocabData[theme].forEach((item) => {
                const card = document.createElement('div');
                card.className = 'vocab-flip-card';
                card.onclick = () => card.classList.toggle('is-flipped');

                card.innerHTML =
                    '<div class="vocab-flip-card-inner">' +
                        '<div class="vocab-card-front">' +
                            '<span class="vocab-card-number">' + globalIndex + '</span>' +
                            '<span class="vocab-card-word">' + item.word + '</span>' +
                            '<span class="vocab-flip-hint">Tap to flip</span>' +
                        '</div>' +
                        '<div class="vocab-card-back">' +
                            '<span class="vocab-card-meaning">' + item.meaning + '</span>' +
                        '</div>' +
                    '</div>';
                grid.appendChild(card);
                globalIndex++;
            });

            slide.appendChild(grid);
            track.appendChild(slide);
        });

        // --- Slider control ---
        function updateSlider() {
            track.style.transform = 'translateX(-' + (currentSlide * 100) + '%)';
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === themes.length - 1;
            progressFill.style.width = (((currentSlide + 1) / themes.length) * 100) + '%';

            // Clamp viewport height to the active slide so empty white space
            // below shorter slides is hidden, and resize changes reflow.
            const active = track.children[currentSlide];
            if (active) viewport.style.height = active.offsetHeight + 'px';
        }

        function moveSlide(direction) {
            currentSlide = Math.max(0, Math.min(themes.length - 1, currentSlide + direction));
            updateSlider();
            scrollToTop();
        }

        // --- Bulk reveal/reset the active theme ---
        function revealAll() {
            const active = track.children[currentSlide];
            if (!active) return;
            active.querySelectorAll('.vocab-flip-card').forEach((c) => c.classList.add('is-flipped'));
        }

        function hideAll() {
            document.querySelectorAll('.vocab-flip-card').forEach((c) => c.classList.remove('is-flipped'));
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Floating back-to-top visibility ---
        window.addEventListener('scroll', () => {
            if (window.scrollY > 200) {
                backToTopBtn.classList.add('is-visible');
            } else {
                backToTopBtn.classList.remove('is-visible');
            }
        });

        // Re-measure active slide on resize so height stays correct.
        window.addEventListener('resize', () => {
            const active = track.children[currentSlide];
            if (active) viewport.style.height = active.offsetHeight + 'px';
        });

        // Initialize after first paint so the slide DOM has dimensions.
        setTimeout(updateSlider, 50);
    </script>

    <!-- landing.js provides the page-level theme toggle that persists
         under localStorage['appTheme']. It also wires card-track cues
         on the landing page, but those querySelectorAll calls silently
         no-op here since vocab-stage has none. -->
    <script src="./landing.js"></script>

    <!-- 3D Word Graph: renderer + vocab data + init -->
    <script src="./graph-3d.js"></script>
    <script src="./vocab-graph-data.js"></script>
    <script>
      (function () {
        'use strict';

        var vocabGraphViz = null;
        var vocabGraphInitialized = false;
        var vocabResizeListener = null;
        var vocabThemeObserver = null;

        function vocabIsDark() {
          return document.body.getAttribute('data-theme') === 'dark';
        }
        function vocabGetEdgeColor() {
          return vocabIsDark() ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.06)';
        }

        // Toggle between card carousel and word graph
        window.switchVocabView = function (view) {
          var sliderArea = document.getElementById('sliderViewport').parentElement;
          var controlsArea = document.querySelector('.vocab-stage-controls');
          var graphSection = document.getElementById('vocabGraphSection');
          var topAnchor = document.getElementById('topAnchor');

          if (view === 'map') {
            sliderArea.style.display = 'none';
            controlsArea.style.display = 'none';
            topAnchor.style.display = 'none';
            graphSection.style.display = 'block';
            initVocabGraph();
          } else {
            sliderArea.style.display = '';
            controlsArea.style.display = '';
            topAnchor.style.display = '';
            graphSection.style.display = 'none';
          }
        };

        function initVocabGraph() {
          if (vocabGraphInitialized) return;
          var canvas = document.getElementById('vocabGraphCanvas');
          if (!canvas) return;

          var data = vocabGraphData;

          // Build legend
          var legendEl = document.getElementById('vocabGraphLegend');
          if (legendEl) {
            var cats = data.categories;
            var legendHtml = '';
            var catNames = Object.keys(cats).sort();
            for (var ci = 0; ci < catNames.length; ci++) {
              var name = catNames[ci];
              var info = cats[name];
              legendHtml +=
                '<span class="gk-legend-item">' +
                '<span class="gk-legend-dot" style="background:' + info.color + '"></span>' +
                name.charAt(0).toUpperCase() + name.slice(1) + ' (' + info.count + ')' +
                '</span>';
            }
            legendEl.innerHTML = legendHtml;
          }

          try {
            vocabGraphViz = new Graph3D(canvas, {
              nodes: data.nodes,
              edges: data.edges
            });

            vocabGraphViz.bgColor = 'transparent';
            vocabGraphViz.nodeRadius = 7;
            vocabGraphViz.edgeColor = vocabGetEdgeColor();
            vocabGraphViz.edgeWidth = 1.0;
            vocabGraphViz.labelFont = 'bold 11px "Nunito Sans", system-ui, sans-serif';

            // Resize to fit container
            var wrap = document.getElementById('vocabGraphCanvasWrap');
            function resizeCanvas() {
              var rect = wrap.getBoundingClientRect();
              canvas.style.width = rect.width + 'px';
              canvas.style.height = rect.height + 'px';
              if (vocabGraphViz) vocabGraphViz._resize();
            }
            resizeCanvas();

            // Remove old listener before adding new one (prevents stacking)
            if (vocabResizeListener) window.removeEventListener('resize', vocabResizeListener);
            vocabResizeListener = resizeCanvas;
            window.addEventListener('resize', vocabResizeListener);

            // Watch for theme changes to update edge color
            if (vocabThemeObserver) vocabThemeObserver.disconnect();
            vocabThemeObserver = new MutationObserver(function () {
              if (vocabGraphViz) {
                vocabGraphViz.edgeColor = vocabGetEdgeColor();
              }
            });
            vocabThemeObserver.observe(document.body, { attributes: true, attributeFilter: ['data-theme'] });

            vocabGraphViz.setInteraction(true);
            vocabGraphViz.start();
            vocabGraphInitialized = true;
          } catch (e) {
            console.warn('Vocab Graph init failed:', e);
            if (legendEl) {
              legendEl.innerHTML = '<span style="color:#999">Graph could not be loaded. Refresh to try again.</span>';
            }
          }
        }
      })();
    </script>
</body>
</html>
