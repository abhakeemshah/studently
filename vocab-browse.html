<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Browse 103 vocabulary words across 9 themes — meanings and synonym connections shown as readable lists.">
    <meta name="theme-color" content="#a570ff">
    <title>Vocab Word Browser — Master Study Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./landing.css">
    <style>
        .browse-section { width: 100%; padding: 40px 24px 64px; background: var(--color-section-alt, #f5f6f8); }
        .browse-inner { max-width: 960px; margin: 0 auto; }
        .browse-head { text-align: center; margin-bottom: 32px; }
        .browse-head-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 999px; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; background: rgba(165, 112, 255, 0.12); color: var(--color-grape-soda); }
        .browse-head h2 { font-family: var(--font-feather); font-weight: 700; font-size: clamp(24px, 3vw, 34px); letter-spacing: -0.02em; color: var(--color-almost-black); margin: 0 0 8px; }
        .browse-head p { font-size: 15px; color: var(--color-graphite); max-width: 520px; margin: 0 auto; }
        .browse-grid { display: grid; gap: 16px; }
        .browse-card { border: 1.5px solid var(--color-cloud-gray); border-radius: 12px; overflow: hidden; background: var(--color-snow-white); }
        .browse-card-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; cursor: pointer; user-select: none; transition: background 0.15s ease; }
        .browse-card-header:hover { background: rgba(0,0,0,0.02); }
        .browse-card-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
        .browse-card-title { font-family: var(--font-feather); font-weight: 700; font-size: 17px; color: var(--color-almost-black); flex-grow: 1; }
        .browse-card-count { font-size: 12px; font-weight: 700; color: var(--color-silver); background: var(--color-cloud-gray); padding: 2px 10px; border-radius: 999px; }
        .browse-card-toggle { font-size: 14px; color: var(--color-silver); transition: transform 0.2s ease; width: 20px; text-align: center; }
        .browse-card.open .browse-card-toggle { transform: rotate(90deg); }
        .browse-card-body { display: none; padding: 4px 18px 18px; }
        .browse-card.open .browse-card-body { display: block; }
        .browse-item { padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; border: 1px solid var(--color-cloud-gray); }
        .browse-item:last-child { margin-bottom: 0; }
        .browse-item-main { display: flex; align-items: center; gap: 8px; }
        .browse-item-emoji { font-size: 18px; flex-shrink: 0; }
        .browse-item-label { font-weight: 700; font-size: 15px; color: var(--color-almost-black); }
        .browse-item-meaning { font-size: 12px; color: var(--color-graphite); line-height: 1.4; margin-top: 4px; padding-left: 30px; opacity: 0.8; }
        .browse-item-conns { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding-left: 30px; }
        .browse-conn-pill { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 700; color: var(--color-graphite); background: var(--color-cloud-gray); padding: 2px 8px; border-radius: 6px; }
        .browse-conn-pill::before { content: "→"; font-weight: 400; opacity: 0.6; }
        .browse-actions { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 24px; }
        .browse-btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; font-family: var(--font-din-round); font-weight: 700; font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase; border-radius: 10px; cursor: pointer; text-decoration: none; transition: transform 0.1s ease, box-shadow 0.1s ease; border: none; }
        .browse-btn:active { transform: translateY(3px); box-shadow: none !important; }
        .browse-btn--vocab { background: var(--color-grape-soda); color: white; box-shadow: 0 4px 0 #7b3fe0; }
        .browse-btn--vocab:hover { background: #9035e0; }
        .browse-btn--outline { background: var(--color-snow-white); color: var(--color-sky-blue); border: 1.5px solid var(--color-cloud-gray); box-shadow: 0 3px 0 var(--color-cloud-gray); }
        .browse-btn--outline:hover { border-color: var(--color-sky-blue); }

        [data-theme="dark"] { --color-section-alt: #0a0f1d; }
        [data-theme="dark"] .browse-card { background: #1e293b; border-color: #334155; }
        [data-theme="dark"] .browse-item { border-color: #334155; background: #0f172a; }
        [data-theme="dark"] .browse-conn-pill { background: #334155; color: var(--color-graphite); }
        [data-theme="dark"] .browse-card-count { background: #334155; color: var(--color-silver); }
        [data-theme="dark"] .browse-btn--outline { background: #1e293b; border-color: #334155; color: var(--color-sky-blue); }

        @media (max-width: 700px) { .browse-section { padding: 24px 16px 48px; } .browse-card-title { font-size: 15px; } }
        @media (max-width: 480px) { .browse-actions { flex-direction: column; align-items: stretch; } .browse-btn { justify-content: center; } }
    </style>
</head>
<body data-theme="light">
    <div class="page-backdrop" aria-hidden="true"></div>
    <header class="topbar" role="banner">
        <a href="./index.html" class="brand" aria-label="Master Study Hub — home">
            <span class="brand-dot" aria-hidden="true"></span>
            <span>master study hub</span>
        </a>
        <nav style="display:flex;gap:8px;">
            <a href="./gk-browse.html" style="font-size:13px;font-weight:700;text-transform:uppercase;color:var(--color-duo-green);padding:6px 12px;border-radius:8px;text-decoration:none;">GK</a>
            <a href="./vocab-browse.html" style="font-size:13px;font-weight:700;text-transform:uppercase;color:var(--color-grape-soda);padding:6px 12px;border-radius:8px;text-decoration:none;">Browse</a>
            <a href="./vocab.html" style="font-size:13px;font-weight:700;text-transform:uppercase;color:var(--color-grape-soda);padding:6px 12px;border-radius:8px;text-decoration:none;background:rgba(165,112,255,0.12);">Cards</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme" title="Switch theme">🌙</button>
    </header>
    <main>
        <section class="browse-section">
            <div class="browse-inner">
                <div class="browse-head">
                    <span class="browse-head-badge">🔗 Word Browser</span>
                    <h2>Vocabulary — by Theme</h2>
                    <p>103 words across 9 themes. Each word shows its meaning and connected synonyms. Click any section to expand.</p>
                </div>
                <div class="browse-grid" id="vocabGrid"></div>
                <div class="browse-actions">
                    <a class="browse-btn browse-btn--vocab" href="./vocab.html">📇 Study with flashcards</a>
                    <a class="browse-btn browse-btn--outline" href="./index.html">🏠 Back to Home</a>
                </div>
            </div>
        </section>
    </main>
    <footer class="landing-footer" role="contentinfo">
        Made with <span aria-hidden="true">❤️</span> — no signup, no tracking.
        <a href="./index.html">Home</a> · <a href="./vocab.html">Vocab Cards</a>
    </footer>
    <script src="./landing.js"></script>
    <script src="./vocab-graph-data.js"></script>
    <script>
      (function () {
        'use strict';
        var data = vocabGraphData, grid = document.getElementById('vocabGrid');
        if (!grid) return;
        var nodeMap = {}, adj = {}, cats = {};
        data.nodes.forEach(function (n) { nodeMap[n.id] = n; if (!cats[n.category]) cats[n.category] = []; cats[n.category].push(n); });
        data.edges.forEach(function (e) {
          if (!adj[e.source]) adj[e.source] = []; if (!adj[e.target]) adj[e.target] = [];
          if (adj[e.source].indexOf(e.target) === -1) adj[e.source].push(e.target);
          if (adj[e.target].indexOf(e.source) === -1) adj[e.target].push(e.source);
        });
        Object.keys(cats).sort().forEach(function (cat) {
          var items = cats[cat], color = items[0].color || '#a570ff';
          var card = document.createElement('div'); card.className = 'browse-card';
          var hdr = document.createElement('div'); hdr.className = 'browse-card-header';
          hdr.innerHTML = '<span class="browse-card-dot" style="background:' + color + '"></span><span class="browse-card-title">' + cat.charAt(0).toUpperCase() + cat.slice(1) + '</span><span class="browse-card-count">' + items.length + '</span><span class="browse-card-toggle">▶</span>';
          hdr.addEventListener('click', function () { card.classList.toggle('open'); });
          card.appendChild(hdr);
          var body = document.createElement('div'); body.className = 'browse-card-body';
          items.forEach(function (node) {
            var item = document.createElement('div'); item.className = 'browse-item';
            var conns = adj[node.id] || [], labels = [];
            conns.forEach(function (cid) { var cn = nodeMap[cid]; if (cn) labels.push(cn.label); });
            var html = '<div class="browse-item-main">' + (node.emoji ? '<span class="browse-item-emoji">' + node.emoji + '</span>' : '') + '<span class="browse-item-label">' + node.label + '</span></div>';
            if (node.description) html += '<div class="browse-item-meaning">' + node.description + '</div>';
            if (labels.length > 0) {
              html += '<div class="browse-item-conns">';
              var seen = {}; labels.slice(0, 6).forEach(function (l) { if (!seen[l]) { seen[l] = true; html += '<span class="browse-conn-pill">' + l + '</span>'; } });
              if (labels.length > 6) html += '<span class="browse-conn-pill" style="background:transparent;color:var(--color-silver);">+' + (labels.length - 6) + ' more</span>';
              html += '</div>';
            }
            item.innerHTML = html; body.appendChild(item);
          });
          card.appendChild(body); grid.appendChild(card);
        });
      })();
    </script>
</body>
</html>
